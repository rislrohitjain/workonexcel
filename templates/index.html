<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>WorkOnExcel | Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .table-container { max-height: 600px; overflow: auto; border-radius: 12px; border: 1px solid #334155; }
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }
        .spinner-icon { font-size: 3.5rem; color: #38bdf8; animation: fa-spin 1.5s infinite linear; }
        .filter-row { border-bottom: 1px solid #334155; padding: 10px 0; }
        .text-nowrap { white-space: nowrap; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <i class="fas fa-circle-notch spinner-icon"></i>
    <div class="mt-3 fw-bold text-uppercase" id="loader-msg">Processing</div>
    <div class="text-muted small" id="loader-timer">Time: 0s</div>
</div>

<div class="container py-5">
    <div class="d-flex align-items-center mb-5">
        <div class="bg-primary p-3 rounded-3 me-3"><i class="fas fa-database fs-3 text-white"></i></div>
        <div>
            <h2 class="mb-0 fw-bold text-info">WorkOnExcel</h2>
            <p class="text-muted mb-0 small">High-Performance Polars Analysis Engine</p>
        </div>
    </div>
    
    <!-- Inside the Upload Section Card -->
	<div class="card p-4 mb-4 shadow-lg">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<label class="form-label small fw-bold text-uppercase text-secondary mb-0">1. Select & Initialize Data</label>
			<a href="/download-template" class="btn btn-outline-info btn-sm">
				<i class="fas fa-file-download me-1"></i> Download Sample Template
			</a>
		</div>
		<div class="input-group">
			<input type="file" id="excelFile" class="form-control">
			<button onclick="handleAction('upload')" class="btn btn-primary px-4">Upload & List Data</button>
		</div>
	</div>

    <div id="controls" class="card p-4 mb-4 shadow-lg" style="display:none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <label class="fw-bold small text-uppercase text-info">2. Advanced Filtering & Sorting</label>
            <div>
                <button onclick="handleAction('filter')" class="btn btn-success btn-sm me-2"><i class="fas fa-check-double me-1"></i> Apply Changes</button>
                <button onclick="handleAction('export')" class="btn btn-warning btn-sm text-white"><i class="fas fa-file-excel me-1"></i> Export Result</button>
            </div>
        </div>
        <div id="filter-grid" class="px-2"></div>
    </div>

    <div class="table-container bg-dark shadow-lg">
        <table class="table table-hover table-dark mb-0" id="resultTable">
            <thead><tr><th class="p-5 text-center text-muted small">System Ready. Please upload a file.</th></tr></thead>
        </table>
    </div>
</div>

<script>
    let filePath = "";
    let lastResult = [];
    let timerInterval;

    function showLoader(msg) {
        document.getElementById('loader-overlay').style.display = 'flex';
        document.getElementById('loader-msg').innerText = msg;
        let s = 0;
        timerInterval = setInterval(() => { s++; document.getElementById('loader-timer').innerText = `Time: ${s}s`; }, 1000);
    }

    function hideLoader() { 
        document.getElementById('loader-overlay').style.display = 'none'; 
        clearInterval(timerInterval); 
    }

    function generateUI(cols) {
        const grid = document.getElementById('filter-grid');
        grid.innerHTML = cols.map(c => `
            <div class="row g-2 align-items-center filter-row f-row" data-col="${c}">
                <div class="col-md-3 small fw-bold text-info text-truncate">${c}</div>
                <div class="col-md-2">
                    <select class="form-select form-select-sm op-in">
                        <option value="=">=</option>
                        <option value="like">Contains</option>
                        <option value="!=">!=</option>
                        <option value=">">&gt;</option>
                        <option value="<">&lt;</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control form-control-sm val-in" placeholder="...">
                </div>
                <div class="col-md-4">
                    <div class="btn-group btn-group-sm w-100">
                        <input type="radio" class="btn-check" name="s_${c}" id="n_${c}" value="none" checked>
                        <label class="btn btn-outline-secondary" for="n_${c}">None</label>
                        <input type="radio" class="btn-check" name="s_${c}" id="a_${c}" value="asc">
                        <label class="btn btn-outline-primary" for="a_${c}">ASC</label>
                        <input type="radio" class="btn-check" name="s_${c}" id="d_${c}" value="desc">
                        <label class="btn btn-outline-primary" for="d_${c}">DESC</label>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function handleAction(type) {
        if(type === 'upload') {
            const f = document.getElementById('excelFile').files[0];
            if(!f) return alert("Select a file.");
            showLoader("Uploading & Processing Data...");
            
            const fd = new FormData(); fd.append('file', f);
            const res = await fetch('/proxy-upload', { method: 'POST', body: fd }).then(r => r.json());
            
            if(res.error) { hideLoader(); return alert(res.error); }
            
            filePath = res.path;
            generateUI(res.columns);
            document.getElementById('controls').style.display = 'block';

            // Immediate listing logic
            const filterFd = new FormData();
            filterFd.append('file_path', filePath);
            filterFd.append('filters', JSON.stringify([]));
            filterFd.append('sorts', JSON.stringify([]));
            
            lastResult = await fetch('http://127.0.0.1:8000/filter', { method: 'POST', body: filterFd }).then(r => r.json());
            renderTable(lastResult);

        } else if(type === 'filter') {
            showLoader("Filtering Dataset...");
            const filters = [], sorts = [];
            document.querySelectorAll('.f-row').forEach(r => {
                const c = r.dataset.col, v = r.querySelector('.val-in').value, s = r.querySelector('input:checked').value;
                if(v.trim() !== "") filters.push({ col: c, op: r.querySelector('.op-in').value, val: v });
                if(s !== "none") sorts.push({ col: c, desc: s === "desc" });
            });
            
            const fd = new FormData();
            fd.append('file_path', filePath);
            fd.append('filters', JSON.stringify(filters));
            fd.append('sorts', JSON.stringify(sorts));
            
            lastResult = await fetch('http://127.0.0.1:8000/filter', { method: 'POST', body: fd }).then(r => r.json());
            renderTable(lastResult);

        } else if(type === 'export') {
			if(!lastResult || lastResult.length === 0) {
				alert("Table is empty. Filter data before exporting.");
				hideLoader();
				return;
			}

			showLoader("Generating Excel File...");
			const fd = new FormData();
			fd.append('data', JSON.stringify(lastResult));

			try {
				const response = await fetch('http://127.0.0.1:8000/export', { 
					method: 'POST', 
					body: fd 
				});
				const res = await response.json();
				<!-- alert(res.path); -->
				if (res.path) {
					// SUCCESS: Redirect the current window to the download route
					// This triggers the browser's native download dialog
					const downloadUrl = `/download-file?path=${encodeURIComponent(res.path)}`;
					window.location.href = downloadUrl;
				} else {
					alert("Server failed to generate file path.");
				}
			} catch (e) {
				alert("Export failed: " + e);
			}
		}
        hideLoader();
    }

    function renderTable(data) {
        const t = document.getElementById('resultTable');
        if(!data || !data.length) { t.innerHTML = "<tr><td class='p-5 text-center'>No records match your criteria.</td></tr>"; return; }
        let h = `<thead class="table-active"><tr>${Object.keys(data[0]).map(k => `<th class="text-nowrap border-secondary">${k}</th>`).join('')}</tr></thead><tbody>`;
        h += data.map(r => `<tr>${Object.values(r).map(v => `<td class="text-nowrap text-secondary small border-secondary">${v ?? ''}</td>`).join('')}</tr>`).join('');
        t.innerHTML = h + "</tbody>";
    }
</script>
</body>
</html>
